<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/pranAyu.css">
    <title>Account Login</title>
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <label>User name or Mobile Number</label><br>
            <input type="number" id="username" placeholder="Mobile Number" required><br><br>

            <label>Password</label><br>
            <input type="password" id="password" placeholder="Password" required><br><br>

            <button type="submit">Login</button>
        </form>

        <br><br>
        <button onclick="window.location.href='signup.html'" type="button">Create</button>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Your Supabase Config -->
    <script>
        const supabase = window.supabase.createClient(
            "https://ugqoldpuacpigsimycvm.supabase.co",
            "YOUR_ANON_PUBLIC_KEY"
        );

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: username,
                password: password,
            });

            if (error) {
                alert(error.message);
            } else {
                window.location.href = "home.html";
            }
        });
    </script>

</body>
</html>
