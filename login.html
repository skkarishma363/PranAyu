<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/login.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap"
rel="stylesheet">
</head>

<body>

<nav class="navbar">
<div class="logo">
<img src="leafLog.png" alt="PranAyu logo">
<span>PranAyu</span>
</div>
</nav>

<div class="login-container">
<h2>Login</h2>

<form id="loginForm">

<label>Mobile Number</label>
<input
type="tel"
id="phone"
pattern="[0-9]{10}"
maxlength="10"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
required
/>

<label>Password</label>
<input
type="password"
id="password"
required
/>

<p class="forgot-text">
<a href="#">Forgot password?</a>
</p>

<button type="submit">Login</button>

<p class="account-text">
Don’t have an account?
</p>

</form>

<button onclick="window.location.href='signup.html'" type="button">
Create Account
</button>

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {

e.preventDefault();

const phone = document.getElementById("phone").value.trim();
const password = document.getElementById("password").value;

/* Validation */

if (!/^\d{10}$/.test(phone)) {
alert("Mobile number must be exactly 10 digits.");
return;
}

try {

/* ================= CALL PYTHON BACKEND ================= */

const response = await fetch("http://localhost:5000/login", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
phone: phone,
password: password
})
});

const data = await response.json();

if (response.ok) {

alert("Login Successful ✅");

/* Role Based Redirect */

if (data.role === "asha_worker") {
window.location.href = "asha_dashboard.html";
}
else {
window.location.href = "home.html";
}

} else {
alert("Login Failed ❌ " + data.error);
}

} catch (err) {
alert("Server Error ❌ " + err.message);
}

});

</script>

</body>
</html>
