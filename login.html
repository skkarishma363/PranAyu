<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <img src="leafLog.png" alt="PranAyu logo">
            <span>PranAyu</span>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="login-container">
        <h2>Login</h2>

        <form id="loginForm">
            <label for="username">Mobile number</label><br />
            <input
                type="tel"
                id="username"
                name="username"
                placeholder="Enter your Mobile Number"
                pattern="[0-9]{10}"
                maxlength="10"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                required
            /><br><br>

            <label for="password">Password</label><br>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Enter Password" 
                required
            ><br><br>

            <button type="submit">Login</button>
        </form>

        <br><br>

        <button onclick="window.location.href='signup.html'" type="button">
            Create Account
        </button>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Supabase Login Script -->
    <script>
        const supabaseClient = window.supabase.createClient(
            "https://ugqoldpuacpigsimycvm.supabase.co",
            "YOUR_PUBLIC_ANON_KEY"
        );

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const phone = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            // Validation
            if (phone.length !== 10) {
                alert("Please enter a valid 10-digit mobile number.");
                return;
            }

            if (!password) {
                alert("Please enter password.");
                return;
            }

            const fakeEmail = phone + "@pranayu.com";

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: fakeEmail,
                password: password,
            });

            if (error) {
                alert("Login Failed: " + error.message);
            } else if (data.session) {
                alert("Login Successful!");
                window.location.href = "home.html";
            }
        });
    </script>

</body>
</html>
