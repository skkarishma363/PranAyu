<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Georgia', serif;
}

body {
    height: 100vh;
    background-color: #e1f8dc;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
}

/* ===== Header ===== */
.navbar {
    position: absolute;
    top: 35px;
    left: 70px;
    background: transparent;   /* important */
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    background: transparent;   /* removes grey box */
}

.logo img {
    height: 48px;
    width: auto;
    display: block;
}

.logo span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 1000;
    color: #2f6f3e;
    letter-spacing: 1px;
}
.login-container {
    width: 300px;
    text-align: center;
}

/* Heading */
.login-container h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 500;
    color: #2f5e3a;
    margin-bottom: 35px;
}

/* Labels */
.login-container label {
    display: block;
    text-align: left;
    margin-bottom: 0px;  /* tighter */
    color: #2f5e3a;
    font-size: 15px;
}

/* Inputs */
.login-container input {
    width: 100%;
    padding: 15px;
    border-radius: 25px;
    border: none;
    outline: none;
    background-color: #c8dec1;
    font-size: 14px;
    margin-bottom: 0px; /* reduced spacing */
    color: #2f5e3a;
    transition: 0.2s ease;
}

.login-container input:focus {
    background-color: #d4dfd2;
}

/* Login Button */
.login-container button[type="submit"] {
    width: 100%;
    padding: 12px;
    border-radius: 25px;
    border: none;
    background-color: #2f6f3e;
    color: rgb(255, 255, 255);
    font-size: 15px;
    cursor: pointer;
    margin-top: 5px;
    margin-bottom: 0px; /* tighter */
    transition: 0.2s ease;
}

.login-container button[type="submit"]:hover {
    background-color: #245730;
}

/* Text */
.login-container p,
.login-container label[for="create"] {
    font-size: 14px;
    color: #2f5e3a;
    margin-bottom: 10px;
}

/* Create Button */
.login-container button[type="button"] {
    padding: 8px 25px;
    border-radius: 20px;
    border: 1.5px solid #2f6f3e;
    background: transparent;
    color: #2f6f3e;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s ease;
}

.login-container button[type="button"]:hover {
    background-color: #2f6f3e;
    color: white;
}
</style>


</head>
<body>
            <nav class="navbar">
                
                 <div class="logo"><img src="leafLog.png" alt="PranAyu logo">
                 <span>PranAyu</span>
                 </div>
            </nav>
    <div class="login-container">
        
        <h2>Login</h2>
        <form action="/submit_login" method="post">
            <label for="username">Username or Mobile Number</label><br>
            <input type="number" id="username" name="username" placeholder="Mobile Number" required><br><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password" placeholder="Password" required><br><br>
            <button type="submit">Login</button>
            <br><br>
        </form>
        <label for="create">Don't have an account?</label><br> 
        <button onclick="window.location.href='signup.html'" type="button">Create</button>
    </div>
</body>
</html>
