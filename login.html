<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <img src="leafLog.png" alt="PranAyu logo">
            <span>PranAyu</span>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="login-container">
        <h2>Login</h2>

        <form id="loginForm">
            <label>Email</label><br>
            <input type="tel" id="email" placeholder="Enter Registered Email" required><br><br>

            <label for="password">Password</label><br>
            <input type="password" id="password" placeholder="Enter Password" required><br><br>

            <button type="submit" id="loginBtn">Login</button>
        </form>

        <br><br>

        <button onclick="window.location.href='signup.html'" type="button">
            Create Account
        </button>

        <p id="message" style="color:red;"></p>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const supabase = window.supabase.createClient(
                "https://ugqoldpuacpigsimycvm.supabase.co",
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVncW9sZHB1YWNwaWdzaW15Y3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NDE4ODksImV4cCI6MjA4NzMxNzg4OX0.vnNS8ai-xuCO_4nMVg5TLADreD3BphVXd-mE9_A_ka4"
            );

            const form = document.getElementById("loginForm");
            const message = document.getElementById("message");
            const loginBtn = document.getElementById("loginBtn");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                message.textContent = "";
                loginBtn.disabled = true;
                loginBtn.textContent = "Logging in...";

                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value;

                const { error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    message.textContent = error.message;
                    loginBtn.disabled = false;
                    loginBtn.textContent = "Login";
                    return;
                }

                // Redirect ONLY after successful login
                window.location.href = "home.html";
            });

        });
    </script>

</body>
</html>
