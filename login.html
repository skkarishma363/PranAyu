<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="css/login.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <img src="leafLog.png" alt="PranAyu logo">
            <span>PranAyu</span>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="login-container">
        <h2>Login</h2>

        <form id="loginForm">
            <label for="username">Email or Mobile Number</label><br>
            <input type="email" id="username" placeholder="Enter Email" required><br><br>

            <label for="password">Password</label><br>
            <input type="password" id="password" placeholder="Enter Password" required><br><br>

            <button type="submit">Login</button>
        </form>

        <br><br>

        <button onclick="window.location.href='signup.html'" type="button">
            Create Account
        </button>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Supabase Login Script -->
    <script>
        const supabase = window.supabase.createClient(
            "https://ugqoldpuacpigsimycvm.supabase.co",
            "YOUR_PUBLIC_ANON_KEY"
        );

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Login Failed: " + error.message);
            } else {
                alert("Login Successful!");
                window.location.href = "home.html";
            }
        });
    </script>

</body>
</html>
