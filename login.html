<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>Login</h2>

<form id="loginForm">
    <label>Mobile Number</label><br>
    <input
        type="tel"
        id="phone"
        placeholder="Enter 10-digit mobile number"
        pattern="[0-9]{10}"
        maxlength="10"
        required
    ><br><br>

    <label>Password</label><br>
    <input
        type="password"
        id="password"
        placeholder="Enter Password"
        required
    ><br><br>

    <button type="submit">Login</button>
</form>

<br>
<button type="button" onclick="window.location.href='signup.html'">
    Create Account
</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
    "https://ugqoldpuacpigsimycvm.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVncW9sZHB1YWNwaWdzaW15Y3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NDE4ODksImV4cCI6MjA4NzMxNzg4OX0.vnNS8ai-xuCO_4nMVg5TLADreD3BphVXd-mE9_A_ka4"
);

// If already logged in → go to home
window.addEventListener("load", async () => {
    const { data } = await supabase.auth.getSession();
    if (data.session) {
        window.location.href = "home.html";
    }
});

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!phone || phone.length !== 10) {
        alert("Enter valid 10-digit mobile number");
        return;
    }

    if (!password) {
        alert("Enter password");
        return;
    }

    const fakeEmail = phone + "@pranayu.com";

    const { data, error } = await supabase.auth.signInWithPassword({
        email: fakeEmail,
        password: password
    });

    if (error) {
        alert("Login Failed: " + error.message);
        return;
    }

    alert("Login Successful!");
    window.location.href = "home.html";
});
</script>

</body>
</html>
