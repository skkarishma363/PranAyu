<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Account Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    


</head>
<body>
            <nav class="navbar">
                
                 <div class="logo"><img src="leafLog.png" alt="PranAyu logo">
                 <span>PranAyu</span>
                 </div>
            </nav>
    <div class="login-container">
        
        <h2>Login</h2>
        <form action="/submit_login" method="post">
            <label for="username">Username or Mobile Number</label><br>
            <input type="mobile number" id="username" name="username" placeholder="Enter username/Mobile Number" required><br><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password" placeholder="Enter Password" required><br><br>
            <button onclick="window.location.href='home.html'" type="submit">Login</button>
            <br><br>
        </form>
        <label for="create">Don't have an account?</label><br> 
        <button onclick="window.location.href='signup.html'" type="button">Create</button>
    </div>
</body>
</html>
