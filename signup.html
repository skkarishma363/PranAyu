<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/signup.css">
    
    <title>Create Account</title>

</head>

<body>
     <nav class="navbar">
                
                 <div class="logo"><img src="leafLog.png" alt="PranAyu logo">
                 <span>PranAyu</span>
                 </div>
            </nav>
    <div class="create-container">
        <h2>Create Account</h2>
        <form action="/submit_create" method="post">
            <label for="Full name">Full name</label><br>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your name" required><br><br>
            <label for="username">Mobile number</label><br>
            <input type="phone number" id="username" name="username" placeholder="Enter your Mobile Number" required><br><br>
            <label for="Age">Age</label><br>
            <input type="number" id="number" name="number" placeholder="Enter your age" required><br><br>
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password" placeholder="Password must be strong" required><br><br>
            <button type="submit">Create Account</button>
            <br><br>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js'

  const supabaseUrl = 'https://ugqoldpuacpigsimycvm.supabase.co'
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVncW9sZHB1YWNwaWdzaW15Y3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NDE4ODksImV4cCI6MjA4NzMxNzg4OX0.vnNS8ai-xuCO_4nMVg5TLADreD3BphVXd-mE9_A_ka4'

  const supabase = createClient(supabaseUrl, supabaseKey)

  const form = document.getElementById('createForm')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()

    const fullName = document.getElementById('fullname').value
    const phone = document.getElementById('username').value
    const password = document.getElementById('password').value

    // 1️⃣ Create Auth User
    const { data, error } = await supabase.auth.signUp({
      email: phone + "@pranayu.com",   // Temporary email format
      password: password
    })

    if (error) {
      alert("Error: " + error.message)
      return
    }

    // 2️⃣ Insert into users table
    await supabase.from('users').insert([
      {
        id: data.user.id,
        name: fullName,
        phone: phone,
        role: "user"
      }
    ])

    alert("Account created successfully!")
    window.location.href = "login.html"
  })
</script>
</body>
</html>
