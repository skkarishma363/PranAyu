<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pranAyuCSS.css">
    <title>Create Account</title>
</head>
<body>
    <div class="create-container">
        <h2>Create Account</h2>
        <form action="/submit_create" method="post">
            <input type="text" id="fullname" name="fullname" placeholder="Full Name" required><br><br>
            <input type="number" id="username" name="username" placeholder="Mobile Number" required><br><br>
            <input type="password" id="password" name="password" placeholder="Password" required><br><br>
            <button type="submit">Create Account</button>
        </form>
</body>
</html>
