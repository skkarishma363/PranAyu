<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account</title>

<link rel="stylesheet" href="css/signup.css" />
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap"
rel="stylesheet">
</head>

<body>

<nav class="navbar">
<div class="logo">
<img src="leafLog.png" alt="PranAyu logo" />
<span>PranAyu</span>
</div>
</nav>

<div class="create-container">
<h2>Create Account</h2>

<form id="createForm">

<label>Full Name</label>
<input type="text" id="fullname" required />

<label>Mobile Number</label>
<input type="tel"
id="phone"
pattern="[0-9]{10}"
maxlength="10"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
required />

<label>Age</label>
<input type="number" id="age" required />

<label>Role</label>
<select id="role" required>
<option value="">Select Role</option>
<option value="patient">User</option>
<option value="asha_worker">ASHA Worker</option>
</select>

<label>Password</label>
<div class="password-wrapper">
<input type="password" id="password" required />
<i id="togglePassword" class="fa-solid fa-eye-slash"></i>
</div>

<br>

<button type="submit">Create Account</button>

</form>
</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

const form = document.getElementById("createForm");
const toggle = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");

/* ================= PASSWORD TOGGLE ================= */

toggle.addEventListener("click", () => {

if (passwordInput.type === "password") {
passwordInput.type = "text";
toggle.classList.replace("fa-eye-slash", "fa-eye");
} else {
passwordInput.type = "password";
toggle.classList.replace("fa-eye", "fa-eye-slash");
}

});

/* ================= FORM SUBMIT ================= */

form.addEventListener("submit", async (e) => {

e.preventDefault();

const fullName = document.getElementById("fullname").value.trim();
const phone = document.getElementById("phone").value.trim();
const age = document.getElementById("age").value.trim();
const role = document.getElementById("role").value;
const password = passwordInput.value;

/* Validation */

if (!/^\d{10}$/.test(phone)) {
alert("Mobile number must be exactly 10 digits.");
return;
}

if (!role) {
alert("Please select a role.");
return;
}

try {

/* ================= CALL PYTHON BACKEND ================= */

const response = await fetch("http://localhost:5000/signup", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
fullname: fullName,
phone: phone,
age: age,
role: role,
password: password
})
});

const data = await response.json();

if (response.ok) {
alert("Account Created Successfully ✅");
window.location.href = "login.html";
} else {
alert("Signup Failed ❌ " + data.error);
}

} catch (err) {
alert("Server Error ❌ " + err.message);
}

});

</script>

</body>
</html>
