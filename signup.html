<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/pranAyu.css">
    <title>Create Account</title>
</head>

<body>
    <div class="create-container">
        <h2>Create Account</h2>
        <form id="createForm">
            <input type="text" id="fullname" name="fullname" placeholder="Full Name" required><br><br>
            <input type="number" id="username" name="username" placeholder="Mobile Number" required><br><br>
            <input type="password" id="password" name="password" placeholder="Password" required><br><br>
            <button type="submit">Create Account</button>
        </form>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js'

  const supabaseUrl = 'https://ugqoldpuacpigsimycvm.supabase.co'
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVncW9sZHB1YWNwaWdzaW15Y3ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NDE4ODksImV4cCI6MjA4NzMxNzg4OX0.vnNS8ai-xuCO_4nMVg5TLADreD3BphVXd-mE9_A_ka4'

  const supabase = createClient(supabaseUrl, supabaseKey)

  const form = document.getElementById('createForm')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()

    const fullName = document.getElementById('fullname').value
    const phone = document.getElementById('username').value
    const password = document.getElementById('password').value

    // 1️⃣ Create Auth User
    const { data, error } = await supabase.auth.signUp({
      email: phone + "@pranayu.com",   // Temporary email format
      password: password
    })

    if (error) {
      alert("Error: " + error.message)
      return
    }

    // 2️⃣ Insert into users table
    await supabase.from('users').insert([
      {
        id: data.user.id,
        name: fullName,
        phone: phone,
        role: "user"
      }
    ])

    alert("Account created successfully!")
    window.location.href = "login.html"
  })
</script>
</body>
</html>
