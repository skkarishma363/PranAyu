<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="css/signup.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <img src="leafLog.png" alt="PranAyu logo">
            <span>PranAyu</span>
        </div>
    </nav>

    <!-- Signup Container -->
    <div class="create-container">
        <h2>Create Account</h2>

        <form id="createForm">
            <label for="fullname">Full Name</label><br>
            <input type="text" id="fullname" placeholder="Enter your name" required><br><br>

            <label for="phone">Mobile Number</label><br>
            <input type="tel" id="phone" placeholder="Enter your mobile number" required><br><br>

            <label for="age">Age</label><br>
            <input type="number" id="age" placeholder="Enter your age" required><br><br>

            <label for="password">Password</label><br>
            <input type="password" id="password" placeholder="Password must be strong" required><br><br>

            <button type="submit">Create Account</button>
        </form>

        <br><br>
        <button onclick="window.location.href='login.html'" type="button">
            Already have an account? Login
        </button>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Signup Script -->
    <script>
        const supabase = window.supabase.createClient(
            "https://ugqoldpuacpigsimycvm.supabase.co",
            "YOUR_PUBLIC_ANON_KEY"
        );

        const form = document.getElementById("createForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const fullName = document.getElementById("fullname").value;
            const phone = document.getElementById("phone").value;
            const age = document.getElementById("age").value;
            const password = document.getElementById("password").value;

            // Create Auth User (temporary email format)
            const { data, error } = await supabase.auth.signUp({
                email: phone + "@pranayu.com",
                password: password,
            });

            if (error) {
                alert("Signup Failed: " + error.message);
                return;
            }

            // Insert into users table
            const { error: insertError } = await supabase
                .from("users")
                .insert([
                    {
                        id: data.user.id,
                        name: fullName,
                        phone: phone,
                        age: age,
                        role: "user",
                    },
                ]);

            if (insertError) {
                alert("Database Error: " + insertError.message);
                return;
            }

            alert("Account created successfully!");
            window.location.href = "login.html";
        });
    </script>

</body>
</html>
