<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/signup.css" />
  <title>Create Account</title>

  <!-- Eye icon library -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <nav class="navbar">
    <div class="logo">
      <img src="leafLog.png" alt="PranAyu logo" />
      <span>PranAyu</span>
    </div>
  </nav>

  <div class="create-container">
    <h2>Create Account</h2>

    <!-- ✅ IMPORTANT: add id="createForm" -->
    <form id="createForm">
      <label for="fullname">Full name</label><br />
      <input type="text" id="fullname" name="fullname" placeholder="Enter your name" required />
      <br /><br />

      <label for="username">Mobile number</label><br />
      <input
        type="tel"
        id="username"
        name="username"
        placeholder="Enter your Mobile Number"
        pattern="[0-9]{10}"
        maxlength="10"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        required
      />
      <br /><br />

      <label for="age">Age</label><br />
      <input type="number" id="age" name="age" placeholder="Enter your age" required />
      <br /><br />

      <label for="password">Password</label><br />

      <!-- ✅ Password with eye icon inside input -->
      <div class="password-wrapper">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password must be strong"
          required
        />
        <span class="toggle-password" id="togglePassword" aria-label="Show password">
          <i id="eyeIcon" class="fa-solid fa-eye"></i>
        </span>
      </div>

      <br /><br />

      <button type="submit">Create Account</button>
    </form>
  </div>

  <!-- ✅ Eye toggle script -->
  <script>
    const toggle = document.getElementById("togglePassword");
    const pwd = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    toggle.addEventListener("click", () => {
      const isHidden = pwd.type === "password";
      pwd.type = isHidden ? "text" : "password";
      icon.classList.toggle("fa-eye");
      icon.classList.toggle("fa-eye-slash");
    });
  </script>

  <!-- ✅ Supabase script (keep outside form) -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js";

    const supabaseUrl = "https://veslqhmsyhlhmouojpnj.supabase.co";
    const supabaseKey =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlc2xxaG1zeWhsaG1vdW9qcG5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwODUyNDUsImV4cCI6MjA4NzY2MTI0NX0.CUCPoPjUTYRFagm76uW9j8GdcTrVHnyTDgif4F-FmY8";

    const supabase = createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("createForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const fullName = document.getElementById("fullname").value.trim();
      const phone = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      // Basic check: exactly 10 digits
      if (!/^\d{10}$/.test(phone)) {
        alert("Mobile number must be exactly 10 digits.");
        return;
      }

      // 1️⃣ Create Auth User
      // Convert phone to fake email
const fakeEmail = phone + "@pranayu.com";

const { data, error } = await supabase.auth.signUp({
  email: fakeEmail,
  password: password,
});

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      // 2️⃣ Insert into users table
      const { error: insertError } = await supabase.from("users").insert([
        {
          id: data.user.id,
          name: fullName,
          phone: phone,
          role: "user",
        },
      ]);

      if (insertError) {
        alert("Error: " + insertError.message);
        return;
      }

      alert("Account created successfully!");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
