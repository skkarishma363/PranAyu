<script src="remediesData.js"></script>
<script>

const container = document.getElementById("cards");

function getCurrentLanguage() {
    return localStorage.getItem("lang") || "en";
}

function renderRemedies() {

    const lang = getCurrentLanguage();
    container.innerHTML = "";

    remedies.forEach(item => {

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="symptom">🩺 ${item.symptom[lang]}</div>
            <div class="remedy">${lang === "en" ? "Remedy:" : 
                                  lang === "hi" ? "उपचार:" : 
                                  "చికిత్స:"}</div>
            <div>${item.remedy[lang]}</div>
            <div class="remedy">
                ${lang === "en" ? "Remedy Process / Uses:" :
                  lang === "hi" ? "उपयोग:" :
                  "ఉపయోగం:"}
            </div>
            <div class="process">${item.process[lang]}</div>
        `;

        container.appendChild(card);
    });
}

document.addEventListener("DOMContentLoaded", renderRemedies);

// Re-render when language changes
window.addEventListener("storage", renderRemedies);

</script>
